name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        run: |
          go build -o gjq .
          cp gjq /usr/local/bin/gjq

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: |
          mkdir dist
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${platforms[@]}"; do
            IFS='/' read -r goos goarch <<< "$platform"
            binary="gjq"
            if [ "$goos" = "windows" ]; then
              binary="gjq.exe"
            fi
            output="dist/gjq_${goos}_${goarch}"
            mkdir -p "$output"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build \
              -trimpath \
              -ldflags="-s -w -X github.com/fantods/gjq/cmd.version=${GITHUB_REF_NAME}" \
              -o "$output/$binary" .
            cp LICENSE "$output/"
            tar -czf "dist/gjq_${goos}_${goarch}.tar.gz" -C dist "gjq_${goos}_${goarch}"
          done

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt
          mv checksums.txt ../checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            checksums.txt
